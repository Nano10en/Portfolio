<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.5" result="blur"/>
      <feFlood flood-color="#6366f1" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Subtle gradient overlay -->
  <rect width="64" height="64" rx="14" fill="url(#accent)" opacity="0.08"/>

  <!-- Border -->
  <rect x="1" y="1" width="62" height="62" rx="13" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.6"/>

  <!-- Top-left corner accent dot -->
  <circle cx="10" cy="10" r="2.5" fill="#6366f1" opacity="0.7"/>

  <!-- Bottom-right corner accent dot -->
  <circle cx="54" cy="54" r="2.5" fill="#818cf8" opacity="0.5"/>

  <!-- N glyph — drawn with paths for pixel-perfect rendering at small sizes -->
  <!-- Left vertical bar of N -->
  <rect x="10" y="18" width="5" height="28" rx="1.5" fill="url(#accent)" filter="url(#glow)"/>
  <!-- Right vertical bar of N -->
  <rect x="27" y="18" width="5" height="28" rx="1.5" fill="url(#accent)"/>
  <!-- Diagonal of N -->
  <polygon points="15,18 20,18 32,40 32,46 27,46 15,24" fill="url(#accent)"/>

  <!-- V glyph -->
  <!-- Left arm of V -->
  <polygon points="34,18 39,18 48,40 45.5,46 43,46 34,24" fill="#f1f5f9"/>
  <!-- Right arm of V -->
  <polygon points="53,18 58,18 49,46 46.5,46 44,40" fill="#f1f5f9"/>
</svg>